name: ci
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install git+https://github.com/pgranger23/jaxnu-osc.git
          pip install -e ".[dev]"
      - name: Smoke test (headless render)
        env:
          MPLBACKEND: Agg
        run: |
          nuosc-explorer --snapshot --outdir out
          test -f out/gui_snapshot.png
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot
          path: out/
